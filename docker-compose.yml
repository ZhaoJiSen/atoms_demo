services:
  postgres:
    image: postgres:16-alpine
    container_name: atoms_demo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atoms_demo}
      POSTGRES_USER: ${POSTGRES_USER:-atoms_demo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atoms_demo_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - atoms_demo_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atoms_demo} -d ${POSTGRES_DB:-atoms_demo}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  atoms_demo_pg_data:
